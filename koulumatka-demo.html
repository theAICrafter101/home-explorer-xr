<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Koulumatka</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --ink: #17201b;
      --muted: #5e6b62;
      --line: #d8ded7;
      --panel: #ffffff;
      --bg: #eef2ed;
      --green: #159957;
      --blue: #2563eb;
      --red: #d92d20;
      --amber: #b7791f;
      --shadow: 0 20px 60px rgba(20, 32, 26, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button, select { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr) 330px;
    }

    .sidebar,
    .risk-panel {
      background: var(--panel);
      border-color: var(--line);
      overflow-y: auto;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      padding: 24px;
    }

    .risk-panel {
      border-left: 1px solid var(--line);
      padding: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #173a2a;
      color: #fff;
      font-weight: 800;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .language-toggle,
    .route-toggle {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .language-toggle {
      grid-template-columns: 1fr 1fr;
    }

    .route-toggle {
      grid-template-columns: 1fr 1fr;
    }

    .time-toggle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .language-toggle button,
    .time-toggle button,
    .toggle-btn {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-weight: 750;
    }

    .language-toggle button.active,
    .time-toggle button.active,
    .toggle-btn.active {
      color: #fff;
      background: #173a2a;
      border-color: #173a2a;
    }

    .selector {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .risk-select {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .section-heading {
      font-size: 16px;
      margin: 0 0 10px;
    }

    .section-heading.spacious {
      margin: 22px 0 10px;
    }

    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      padding: 0 12px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .metric {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfb;
    }

    .metric strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
      margin-top: 5px;
    }

    .score {
      display: grid;
      grid-template-columns: 92px 1fr;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .score-ring {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, #fff 57%, transparent 58%),
        conic-gradient(var(--green) calc(var(--score) * 36deg), #e7ece7 0);
      box-shadow: inset 0 0 0 1px #e8eee8;
      font-size: 22px;
      font-weight: 800;
    }

    .score h3 {
      font-size: 16px;
      margin-bottom: 5px;
    }

    .risk-list {
      display: grid;
      gap: 10px;
    }

    .risk-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      cursor: pointer;
    }

    .risk-card.active {
      border-color: #173a2a;
      box-shadow: 0 0 0 3px rgba(23, 58, 42, 0.12);
    }

    .risk-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .time-insight {
      margin: 0 0 18px;
      border: 1px solid #cbe5d4;
      border-radius: 8px;
      background: #eef7f1;
      padding: 13px;
    }

    .time-insight strong {
      display: block;
      margin-bottom: 5px;
    }

    .traffic-line {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.high { color: #fff; background: var(--red); }
    .badge.medium { color: #241507; background: #f4c26b; }
    .badge.low { color: #fff; background: var(--green); }

    .map-area {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background: #dbe4d9;
    }

    .map-area::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      box-shadow: inset 0 0 0 1px rgba(23, 32, 27, 0.18);
    }

    .leaflet-map {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .leaflet-control-layers,
    .leaflet-control-zoom {
      border: 0 !important;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18) !important;
    }

    .leaflet-control-layers {
      border-radius: 8px;
      overflow: hidden;
      font: 13px Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .map-marker {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 3px solid #fff;
      border-radius: 50%;
      color: #fff;
      background: #173a2a;
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
      font-size: 13px;
      font-weight: 900;
    }

    .map-marker.school,
    .map-marker.destination { background: #1d4ed8; }
    .map-marker.risk { background: var(--red); cursor: pointer; }
    .map-marker.risk.medium { background: var(--amber); color: #241507; }
    .map-marker.risk.low { background: var(--green); }
    .map-marker.risk.active { outline: 5px solid rgba(255,255,255,0.65); }

    .map-toolbar {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      z-index: 8;
      pointer-events: none;
    }

    .map-pill {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.91);
      padding: 0 13px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.16);
      font-size: 13px;
      font-weight: 750;
      pointer-events: auto;
    }

    .legend {
      position: absolute;
      left: 18px;
      top: 66px;
      display: grid;
      gap: 8px;
      z-index: 8;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      padding: 0 11px;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 10px 28px rgba(0,0,0,0.14);
    }

    .swatch {
      width: 18px;
      height: 5px;
      border-radius: 999px;
      background: var(--green);
    }

    .swatch.blue { background: var(--blue); }
    .swatch.orange { background: var(--amber); }

    .swatch.red {
      width: 10px;
      height: 10px;
      background: var(--red);
    }

    .risk-preview {
      height: 170px;
      border-radius: 8px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      background: #dbe4d9;
      border: 1px solid var(--line);
    }

    .risk-preview::before,
    .risk-preview::after {
      display: none;
    }

    .risk-preview .leaflet-control-attribution {
      font-size: 9px;
    }

    .panel-title {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .detail-grid {
      display: grid;
      gap: 9px;
      margin: 18px 0;
    }

    .detail {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 9px;
      font-size: 14px;
    }

    .detail span:first-child { color: var(--muted); }

    .recommendation {
      border-radius: 8px;
      background: #eef7f1;
      border: 1px solid #cbe5d4;
      padding: 13px;
      line-height: 1.45;
      font-size: 14px;
    }

    @media (max-width: 1060px) {
      .app { grid-template-columns: 340px minmax(0, 1fr); }

      .risk-panel {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .map-area { min-height: 62vh; }
    }

    @media (max-width: 760px) {
      .app { display: block; }

      .sidebar,
      .risk-panel {
        border: 0;
        padding: 18px;
      }

      .map-area { height: 58vh; }
      .meta-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">K</div>
        <div>
          <h1 id="pageHeading">Koulumatka</h1>
          <p class="subtle" data-i18n="tagline"></p>
        </div>
      </div>

      <div class="language-toggle" role="group" aria-label="Language">
        <button class="active" type="button" data-lang="fi">FI</button>
        <button type="button" data-lang="en">EN</button>
      </div>

      <label class="selector">
        <span class="subtle" data-i18n="selectProperty"></span>
        <select id="propertySelect"></select>
      </label>

      <section class="score" id="scoreBlock">
        <div class="score-ring"><span id="scoreValue"></span></div>
        <div>
          <h3 data-i18n="safety"></h3>
          <p class="subtle" id="scoreText"></p>
        </div>
      </section>

      <h3 class="section-heading" data-i18n="timeContext"></h3>
      <div class="time-toggle" role="group" aria-label="Time context">
        <button class="active" type="button" data-time="morning" data-i18n="morning"></button>
        <button type="button" data-time="midday" data-i18n="midday"></button>
        <button type="button" data-time="afternoon" data-i18n="afternoon"></button>
      </div>

      <div class="time-insight">
        <strong id="timeInsightTitle"></strong>
        <p class="subtle" id="timeInsightText"></p>
      </div>

      <div class="route-toggle" role="group" aria-label="Route choice">
        <button class="toggle-btn active" id="normalRoute" type="button" data-i18n="normalRoute"></button>
        <button class="toggle-btn" id="childRoute" type="button" data-i18n="childRoute"></button>
      </div>

      <div class="meta-grid">
        <div class="metric">
          <span class="subtle" data-i18n="time"></span>
          <strong id="duration"></strong>
        </div>
        <div class="metric">
          <span class="subtle" data-i18n="distance"></span>
          <strong id="distance"></strong>
        </div>
        <div class="metric">
          <span class="subtle" data-i18n="risks"></span>
          <strong id="riskCount"></strong>
        </div>
      </div>

      <h3 class="section-heading spacious" data-i18n="riskPoints"></h3>
      <label class="risk-select">
        <span class="subtle" data-i18n="chooseIntersection"></span>
        <select id="riskSelect"></select>
      </label>
      <div class="risk-list" id="riskList"></div>
    </aside>

    <section class="map-area" aria-label="Map view">
      <div class="map-toolbar">
        <div class="map-pill" id="mapTitle"></div>
      </div>

      <div id="leafletMap" class="leaflet-map" aria-label="Real map"></div>

      <div class="legend">
        <span><i class="swatch"></i><span data-i18n="legendNormal"></span></span>
        <span><i class="swatch blue"></i><span data-i18n="legendChild"></span></span>
        <span><i class="swatch orange"></i><span data-i18n="legendConstruction"></span></span>
        <span><i class="swatch red"></i><span data-i18n="legendRisk"></span></span>
      </div>

    </section>

    <aside class="risk-panel">
      <div class="risk-preview" id="riskPreviewMap" aria-label="Risk point satellite preview"></div>
      <h2 class="panel-title" id="riskTitle"></h2>
      <p class="subtle" id="riskDescription"></p>

      <div class="detail-grid">
        <div class="detail"><span data-i18n="speedLimit"></span><strong id="speed"></strong></div>
        <div class="detail"><span data-i18n="lanes"></span><strong id="lanes"></strong></div>
        <div class="detail"><span data-i18n="crosswalk"></span><strong id="crosswalk"></strong></div>
        <div class="detail"><span data-i18n="trafficLights"></span><strong id="lights"></strong></div>
        <div class="detail"><span data-i18n="visibility"></span><strong id="visibility"></strong></div>
      </div>

      <div class="recommendation" id="recommendation"></div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    function sampledRoutePoints(route, intervalMeters = 70) {
      const sampled = [];
      let distanceSinceSample = Infinity;

      for (let index = 0; index < route.length; index += 1) {
        const point = route[index];
        if (index === 0 || index === route.length - 1 || distanceSinceSample >= intervalMeters) {
          sampled.push(point);
          distanceSinceSample = 0;
          continue;
        }

        distanceSinceSample += distanceBetweenLatLng(route[index - 1], point);
      }

      return sampled;
    }

    function overpassAroundClauses(route, selector, radiusMeters = 95) {

        .map((point) => `${selector}(around:${radiusMeters},${point[0].toFixed(7)},${point[1].toFixed(7)});`)
        .join("\n");

    function overpassQueryForRoute(route) {
      const roadSelector = 'way["highway"~"^(primary|secondary|tertiary|unclassified|residential|living_street)$"]';
      const crossingNodeSelector = 'node["highway"="crossing"]';
      const crossingTagSelector = 'node["crossing"]';
      const signalSelector = 'node["highway"="traffic_signals"]';
      const crossingWaySelector = 'way["footway"="crossing"]';

      return `
        [out:json][timeout:10];
        (
          ${overpassAroundClauses(route, roadSelector)}
          ${overpassAroundClauses(route, crossingNodeSelector)}
          ${overpassAroundClauses(route, crossingTagSelector)}
          ${overpassAroundClauses(route, signalSelector)}
          ${overpassAroundClauses(route, crossingWaySelector)}
        );
        out tags geom;
      `;
    }

    function fetchWithTimeout(url, options, timeoutMs = 12000) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timeout));
    }

    async function fetchOverpassFeatures(property, routeType) {
      const route = property.routeGeometry?.[routeType] || [];
      const query = overpassQueryForRoute(route);
      const body = new URLSearchParams({ data: query });
      const endpoints = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.kumi.systems/api/interpreter"
      ];
      let lastError = null;

      for (const endpoint of endpoints) {
        try {
          const response = await fetchWithTimeout(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body
          });

          if (!response.ok) throw new Error(`Overpass ${response.status}`);
          const data = await response.json();
          return parseOverpassFeatures(data);
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("Overpass query failed");
    }

    function parseNumberTag(value) {
      if (!value) return null;
      const match = String(value).match(/\d+/);
      return match ? Number(match[0]) : null;

    function roadName(tags, fallback) {

    function isMotorRoad(tags) {
      if (!tags.highway) return false;
      if (tags.motor_vehicle === "no") return false;
      if (tags.access === "private") return false;
      if (tags.highway === "service") return false;
      return ["primary", "secondary", "tertiary", "unclassified", "residential", "living_street"].includes(tags.highway);
    }

    function parseOverpassFeatures(data) {
      const features = emptyTrafficFeatures();

      for (const element of data.elements || []) {
        const tags = element.tags || {};

        if (element.type === "way" && element.geometry && isMotorRoad(tags)) {
          features.roads.push({
            id: `osm-way-${element.id}`,
            osmId: element.id,
            name: roadName(tags, tags.highway === "service" ? "Huoltotie" : "Autotie"),
            speedLimit: parseNumberTag(tags.maxspeed),
            lanes: parseNumberTag(tags.lanes),
            width: parseNumberTag(tags.width),
            highway: tags.highway,
            line: element.geometry.map((point) => [point.lat, point.lon])
          });
        }

        if (element.type === "node" && (tags.highway === "crossing" || tags.crossing)) {
          features.crosswalks.push({
            id: `osm-crossing-${element.id}`,
            osmId: element.id,
            coord: [element.lat, element.lon]
          });
        }

        if (element.type === "node" && (tags.highway === "traffic_signals" || tags.crossing === "traffic_signals")) {
          features.trafficSignals.push({
            id: `osm-signal-${element.id}`,
            osmId: element.id,
            coord: [element.lat, element.lon]
          });
        }

        if (element.type === "way" && element.geometry && tags.footway === "crossing") {
          const middle = element.geometry[Math.floor(element.geometry.length / 2)];
          features.crosswalks.push({
            id: `osm-crossing-way-${element.id}`,
            osmId: element.id,
            coord: [middle.lat, middle.lon]
          });
          element.geometry.forEach((point, index) => {
            features.crosswalks.push({
              id: `osm-crossing-way-${element.id}-${index}`,
              osmId: element.id,
              coord: [point.lat, point.lon]
            });
          });
        }
      }

      return features;
    }

    function toXY(point, originLat) {
      const metersPerLat = 110540;
      const metersPerLng = 111320 * Math.cos(originLat * Math.PI / 180);
      return { x: point[1] * metersPerLng, y: point[0] * metersPerLat };
    }

    function fromXY(point, originLat) {
      const metersPerLat = 110540;
      const metersPerLng = 111320 * Math.cos(originLat * Math.PI / 180);
      return [point.y / metersPerLat, point.x / metersPerLng];
    }

    function pointOnSegment(a, b, t) {
      return {
        x: a.x + (b.x - a.x) * t,
        y: a.y + (b.y - a.y) * t
      };
    }

    function distanceBetween(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function closestPointOnSegment(point, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const lengthSq = dx * dx + dy * dy;
      if (!lengthSq) return { point: a, t: 0 };
      const rawT = ((point.x - a.x) * dx + (point.y - a.y) * dy) / lengthSq;
      const t = Math.max(0, Math.min(1, rawT));
      return { point: pointOnSegment(a, b, t), t };
    }

    function distancePointToPolylineMeters(coord, line, originLat) {
      const point = toXY(coord, originLat);
      let best = Infinity;

      for (let index = 0; index < line.length - 1; index += 1) {
        const a = toXY(line[index], originLat);
        const b = toXY(line[index + 1], originLat);
        best = Math.min(best, distanceBetween(point, closestPointOnSegment(point, a, b).point));
      }

      return best;
    }

    function distanceLineToPolylineMeters(line, route, originLat) {
      let best = Infinity;

      for (const point of line) {
        best = Math.min(best, distancePointToPolylineMeters(point, route, originLat));
      }

      for (const point of route) {
        best = Math.min(best, distancePointToPolylineMeters(point, line, originLat));
      }

      return best;
    }

    function segmentIntersection(a, b, c, d) {
      const r = { x: b.x - a.x, y: b.y - a.y };
      const s = { x: d.x - c.x, y: d.y - c.y };
      const denominator = r.x * s.y - r.y * s.x;
      if (Math.abs(denominator) < 0.000001) return null;

      const u = ((c.x - a.x) * r.y - (c.y - a.y) * r.x) / denominator;
      const t = ((c.x - a.x) * s.y - (c.y - a.y) * s.x) / denominator;
      if (t < -0.02 || t > 1.02 || u < -0.02 || u > 1.02) return null;

      return { point: pointOnSegment(a, b, t), routeT: t, roadT: u };
    }

    function segmentAngleDegrees(a, b, c, d) {
      const routeVector = { x: b.x - a.x, y: b.y - a.y };
      const roadVector = { x: d.x - c.x, y: d.y - c.y };
      const routeLength = Math.hypot(routeVector.x, routeVector.y);
      const roadLength = Math.hypot(roadVector.x, roadVector.y);
      if (!routeLength || !roadLength) return 0;

      const dot = Math.abs(routeVector.x * roadVector.x + routeVector.y * roadVector.y);
      const cosine = Math.min(1, dot / (routeLength * roadLength));
      return Math.acos(cosine) * 180 / Math.PI;
    }

    function isLikelyRoadCrossing(routeA, routeB, roadA, roadB, hit) {
      const angle = segmentAngleDegrees(routeA, routeB, roadA, roadB);
      return angle >= 35;
    }

    function lineRouteCrossings(route, roadLine, originLat) {
      const crossings = [];

      for (let routeIndex = 0; routeIndex < route.length - 1; routeIndex += 1) {
        const routeA = toXY(route[routeIndex], originLat);
        const routeB = toXY(route[routeIndex + 1], originLat);

        for (let roadIndex = 0; roadIndex < roadLine.length - 1; roadIndex += 1) {
          const roadA = toXY(roadLine[roadIndex], originLat);
          const roadB = toXY(roadLine[roadIndex + 1], originLat);
          const hit = segmentIntersection(routeA, routeB, roadA, roadB);
          if (!hit) continue;
          if (!isLikelyRoadCrossing(routeA, routeB, roadA, roadB, hit)) continue;

          crossings.push({
            coord: fromXY(hit.point, originLat),
            routeIndex,
            roadIndex,
            routeT: hit.routeT,
            roadT: hit.roadT
          });
        }
      }

      return crossings;
    }

    function buildRoadIntersections(roads) {
      const intersections = [];

      for (let aIndex = 0; aIndex < roads.length; aIndex += 1) {
        const roadA = roads[aIndex];
        const originLat = roadA.line[0]?.[0] || selectedProperty.homeCoord[0];

        for (let bIndex = aIndex + 1; bIndex < roads.length; bIndex += 1) {
          const roadB = roads[bIndex];

          for (let aSegment = 0; aSegment < roadA.line.length - 1; aSegment += 1) {
            const a1 = toXY(roadA.line[aSegment], originLat);
            const a2 = toXY(roadA.line[aSegment + 1], originLat);

            for (let bSegment = 0; bSegment < roadB.line.length - 1; bSegment += 1) {
              const b1 = toXY(roadB.line[bSegment], originLat);
              const b2 = toXY(roadB.line[bSegment + 1], originLat);
              const hit = segmentIntersection(a1, a2, b1, b2);
              if (!hit) continue;

              intersections.push({
                id: `intersection-${roadA.id}-${roadB.id}-${aSegment}-${bSegment}`,
                coord: fromXY(hit.point, originLat)
              });
            }
          }
        }
      }

      return dedupeFeaturePoints(intersections, 12);
    }

    function dedupeFeaturePoints(features, thresholdMeters) {
      const accepted = [];

      for (const feature of features) {
        const duplicate = accepted.some((item) => {
          const originLat = feature.coord[0];
          return distanceBetween(toXY(feature.coord, originLat), toXY(item.coord, originLat)) < thresholdMeters;
        });
        if (!duplicate) accepted.push(feature);
      }

      return accepted;
    }

    function nearestFeature(coord, features, originLat, maxDistanceMeters) {
      let best = null;
      const point = toXY(coord, originLat);

      for (const feature of features) {
        const distance = distanceBetween(point, toXY(feature.coord, originLat));
        if (distance > maxDistanceMeters) continue;
        if (!best || distance < best.distance) best = { ...feature, distance };
      }

      return best;
    }

    function dedupeCrossings(crossings, originLat) {
      const accepted = [];

      for (const crossing of crossings) {
        const point = toXY(crossing.coord, originLat);
        const duplicate = accepted.some((item) => distanceBetween(point, toXY(item.coord, originLat)) < 12);
        if (!duplicate) accepted.push(crossing);
      }

      return accepted;
    }

    function mergeNearbyRisks(risks, originLat) {
      const merged = [];

      for (const risk of risks) {
        const point = toXY(risk.coord, originLat);
        const existing = merged.find((item) => {
          if (item.roadKey !== risk.roadKey) return false;
          const threshold = isMajorCrossingRoad(risk.road) ? 90 : 45;
          return distanceBetween(point, toXY(item.coord, originLat)) < threshold;
        });

        if (!existing) {
          merged.push(risk);
          continue;
        }

        if (isBetterRepresentativeRisk(risk, existing)) {
          Object.assign(existing, risk);
        }
      }

      return merged.map((risk, index) => renumberRisk(risk, index));
    }

    function isBetterRepresentativeRisk(candidate, current) {
      if (candidate.hasSignal !== current.hasSignal) return candidate.hasSignal;
      if (candidate.hasCrosswalk !== current.hasCrosswalk) return candidate.hasCrosswalk;
      if (isMajorCrossingRoad(candidate.road)) return candidate.score < current.score;
      return candidate.score > current.score;
    }

    function renumberRisk(risk, index) {
      const number = index + 1;
      risk.copy.fi.title = `Riskikohta #${number}`;

    function riskLevelFromScore(score, road) {
      if (road.speedLimit !== null && road.speedLimit <= 20) return "low";
      if (score >= 5) return "high";
      if (score >= 3) return "medium";
      return "low";
    }

    function isMajorCrossingRoad(road) {
      return ["primary", "secondary", "tertiary", "unclassified"].includes(road.highway);
    }

    function isSignificantRisk(risk) {
      if (isMajorCrossingRoad(risk.road)) return true;
      if (selectedProperty.id === "aukustintie" && risk.road.highway === "residential" && risk.road.width !== null && risk.road.width <= 4) return false;
      return risk.score >= 1;
    }

    function calculateRiskScore(road, linkedFeatures) {
      let score = 0;
      const reasons = [];

      if (road.speedLimit >= 50) {
        score += 3;
        reasons.push({ fi: "nopeusrajoitus on v&auml;hint&auml;&auml;n 50 km/h", en: "the speed limit is at least 50 km/h" });
      }

      if (!linkedFeatures.signal) {
        score += 2;
        reasons.push({ fi: "ylityksess&auml; ei ole liikennevaloja", en: "there are no traffic signals" });
      }

      if (!linkedFeatures.crosswalk) {
        score += 2;
        reasons.push({ fi: "selke&auml;&auml; suojatiet&auml; ei n&auml;y", en: "there is no clear marked crossing" });
      }

      if ((road.lanes || 0) > 2) {
        score += 1;
        reasons.push({ fi: "tiell&auml; on yli kaksi kaistaa", en: "the road has more than two lanes" });
      }

      if (linkedFeatures.intersection) {
        score += 1;
        reasons.push({ fi: "ylitys on risteyksen l&auml;hell&auml;", en: "the crossing is near an intersection" });
      }

      return { score, reasons };
    }

    function detectRouteRisks(property, routeType, trafficFeatures) {
      const route = property.routeGeometry?.[routeType] || [];
      const data = trafficFeatures || emptyTrafficFeatures();
      const originLat = property.homeCoord[0];
      const bufferMeters = 20;
      const roads = (data.roads || []).filter((road) => distanceLineToPolylineMeters(road.line, route, originLat) <= bufferMeters);
      const crosswalks = (data.crosswalks || []).filter((feature) => distancePointToPolylineMeters(feature.coord, route, originLat) <= bufferMeters);
      const signals = (data.trafficSignals || []).filter((feature) => distancePointToPolylineMeters(feature.coord, route, originLat) <= bufferMeters);
      const intersections = buildRoadIntersections(roads).filter((feature) => distancePointToPolylineMeters(feature.coord, route, originLat) <= bufferMeters);
      const risks = [];

      for (const road of roads) {
        for (const crossing of dedupeCrossings(lineRouteCrossings(route, road.line, originLat), originLat)) {
          if (isSchoolYardApproach(crossing, road, route, activeDestinationCoord(property), originLat)) continue;

          const linkedFeatures = {
            crosswalk: nearestFeature(crossing.coord, crosswalks, originLat, 60),
            signal: nearestFeature(crossing.coord, signals, originLat, isMajorCrossingRoad(road) ? 70 : 18),
            intersection: nearestFeature(crossing.coord, intersections, originLat, 18)
          };
          const risk = calculateRiskScore(road, linkedFeatures);
          if (risk.score === 0 && !isMajorCrossingRoad(road)) continue;

          risks.push(createRouteRisk(property, routeType, road, crossing, linkedFeatures, risk, risks.length));
        }
      }

      return mergeNearbyRisks(risks.filter(isSignificantRisk), originLat);
    }

    function isSchoolYardApproach(crossing, road, route, schoolCoord, originLat) {
      const progress = crossing.routeIndex / Math.max(1, route.length - 1);
      const distanceToSchool = distanceBetween(toXY(crossing.coord, originLat), toXY(schoolCoord, originLat));
      const isMinorRoad = ["residential", "living_street"].includes(road.highway);
      return progress > 0.78 && distanceToSchool < 140 && isMinorRoad;
    }

    async function ensureTrafficFeaturesLoaded() {
      const property = selectedProperty;
      const routeType = selectedRoute;
      if (property.precomputedRisks) {
        trafficFeatureStatus[trafficFeatureKey(property, routeType)] = "loaded";
        selectedRisk = activeRouteRisks()[0] || null;
        renderRoute();
        renderRisks();
        renderRiskDetails();
        renderLeafletRoutes();
        renderLeafletRisks();
        return;
      }
      const key = trafficFeatureKey(property, routeType);
      if (trafficFeatureCache[key] || trafficFeatureStatus[key] === "loading") return;

      const storedFeatures = readStoredTrafficFeatures(key);
      if (storedFeatures) {
        trafficFeatureCache[key] = storedFeatures;
        trafficFeatureStatus[key] = "loaded";
        selectedRisk = activeRouteRisks()[0] || null;
        renderRoute();
        renderRisks();
        renderRiskDetails();
        renderLeafletRoutes();
        renderLeafletRisks();
        return;
      }

      trafficFeatureStatus[key] = "loading";
      renderRisks();
      renderRiskDetails();

      try {
        const features = await fetchOverpassFeatures(property, routeType);
        trafficFeatureCache[key] = features;
        writeStoredTrafficFeatures(key, features);
        trafficFeatureStatus[key] = "loaded";
      } catch (error) {
        console.warn("OSM traffic feature loading failed", error);
        trafficFeatureCache[key] = emptyTrafficFeatures();
        trafficFeatureStatus[key] = "error";
      }

      if (selectedProperty !== property || selectedRoute !== routeType) return;

      selectedRisk = activeRouteRisks()[0] || null;
      renderRoute();
      renderRisks();
      renderRiskDetails();
      renderLeafletRoutes();
      renderLeafletRisks();
    }

    function yesNo(value, lang) {
      if (lang === "fi") return value ? "Kyll&auml;" : "Ei";
      return value ? "Yes" : "No";
    }

    function createRouteRisk(property, routeType, road, crossing, linkedFeatures, risk, index) {
      const level = riskLevelFromScore(risk.score, road);
      const titleNumber = index + 1;
      const fiReasons = risk.reasons.length ? `Huomioitavaa:<br>${risk.reasons.map((reason) => `- ${reason.fi}`).join("<br>")}` : "Ylitys vaikuttaa tavanomaiselta, mutta se kannattaa silti n&auml;ytt&auml;&auml; lapselle.";
      const enReasons = risk.reasons.length ? `Worth noting:<br>${risk.reasons.map((reason) => `- ${reason.en}`).join("<br>")}` : "The crossing looks ordinary, but it is still worth showing to the child.";
      const hasCrosswalk = Boolean(linkedFeatures.crosswalk);
      const hasSignal = Boolean(linkedFeatures.signal);
      const nearIntersection = Boolean(linkedFeatures.intersection);

      return {
        id: `${property.id}-${routeType}-${road.id}-${crossing.routeIndex}-${crossing.roadIndex}`,
        road,
        roadId: road.id,
        roadKey: road.name.fi.toLowerCase(),
        hasCrosswalk,
        hasSignal,
        nearIntersection,
        level,
        score: risk.score,
        coord: crossing.coord,
        copy: {
          fi: {
            title: `Riskikohta #${titleNumber}`,
            description: `${road.name.fi}. ${fiReasons}`,
            speed: `${road.speedLimit || "?"} km/h`,
            lanes: `${road.lanes || "?"}`,
            crosswalk: yesNo(hasCrosswalk, "fi"),
            lights: yesNo(hasSignal, "fi"),
            visibility: nearIntersection ? "Risteyksen l&auml;hell&auml;" : "Ei risteyst&auml; l&auml;hell&auml;",
            recommendation: "K&auml;yk&auml;&auml; t&auml;m&auml; kohta l&auml;pi lapsen kanssa ennen kuin reitist&auml; tulee itsen&auml;inen koulumatka. Harjoitelkaa, miss&auml; pys&auml;hdyt&auml;&auml;n ja mist&auml; suunnista autot voivat tulla."
          },
          en: {
            title: `Risk point #${titleNumber}`,
            description: `${road.name.en}. ${enReasons}`,
            speed: `${road.speedLimit || "?"} km/h`,
            lanes: `${road.lanes || "?"}`,
            crosswalk: yesNo(hasCrosswalk, "en"),
            lights: yesNo(hasSignal, "en"),
            visibility: nearIntersection ? "Near intersection" : "No nearby intersection",
            recommendation: "Walk this spot with the child before the route becomes an independent school trip. Practice where to stop and which directions cars can come from."
          }
        }
      };
    }

    function makeMarkerIcon(type, label, extraClass = "") {
      return L.divIcon({
        className: "",
        html: `<div class="map-marker ${type} ${extraClass}">${label}</div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 17]
      });
    }

    function ensureLeafletMap() {
      if (!window.L) {
        writeHtml(mapTitle, "Karttakirjasto ei latautunut");
        return false;
      }

      if (!leafletMap) {
        const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap"
        });
        const satellite = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
          maxZoom: 19,
          attribution: "Tiles &copy; Esri"
        });

        leafletMap = L.map("leafletMap", {
          layers: [osm],
          zoomControl: true
        }).setView(selectedProperty.homeCoord, 15);

        L.control.layers({
          "Peruskartta": osm,
          "Satelliitti": satellite
        }, null, { position: "topright" }).addTo(leafletMap);
      }

      return true;
    }

    function routeStyle(type) {
      return {
        color: type === "normal" ? "#159957" : "#2563eb",
        weight: 7,
        opacity: 0.95,
        dashArray: type === "child" ? "12 10" : null
      };
    }

    function constructionStyle() {
      return {
        color: "#f59e0b",
        weight: 9,
        opacity: 0.96,
        dashArray: "14 8"
      };
    }

    function riskColor(level) {
      if (level === "high") return "#dc2626";
      if (level === "medium") return "#f59e0b";
      return "#159957";
    }

    function clearLayer(layer) {
      if (layer && leafletMap) leafletMap.removeLayer(layer);
    }

    function clearPreviewLayer(layer) {
      if (layer && riskPreviewMap) riskPreviewMap.removeLayer(layer);
    }

    function ensureRiskPreviewMap() {
      if (!window.L || riskPreviewMap) return Boolean(riskPreviewMap);

      riskPreviewMap = L.map("riskPreviewMap", {
        attributionControl: true,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        keyboard: false,
        zoomControl: false,
        tap: false
      });

      L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
        maxZoom: 19,
        attribution: "Tiles &copy; Esri"
      }).addTo(riskPreviewMap);

      return true;
    }

    function renderRiskPreviewMap() {
      if (!ensureRiskPreviewMap()) return;

      clearPreviewLayer(riskPreviewRouteLine);
      clearPreviewLayer(riskPreviewMarker);
      riskPreviewConstructionLines.forEach(clearPreviewLayer);
      riskPreviewRouteLine = null;
      riskPreviewMarker = null;
      riskPreviewConstructionLines = [];

      const center = selectedRisk?.coord || selectedProperty.homeCoord;
      riskPreviewMap.setView(center, selectedRisk ? 19 : 16);

      if (selectedRisk) {
        riskPreviewRouteLine = L.polyline(routeFallbackCoords(selectedRoute), {
          ...routeStyle(selectedRoute),
          weight: 4,
          opacity: 0.72
        }).addTo(riskPreviewMap);

        riskPreviewConstructionLines = (selectedProperty.constructionSegments || []).map((segment) => (
          L.polyline(segment.coords, {
            ...constructionStyle(),
            weight: 5,
            opacity: 0.88
          }).addTo(riskPreviewMap)
        ));

        riskPreviewMarker = L.circleMarker(selectedRisk.coord, {
          radius: 8,
          color: "#ffffff",
          weight: 3,
          fillColor: riskColor(selectedRisk.level),
          fillOpacity: 0.92,
          opacity: 1,
          interactive: false
        }).addTo(riskPreviewMap);
      }

      setTimeout(() => riskPreviewMap?.invalidateSize(), 0);
    }

    function renderLeafletRiskActive() {
      if (!selectedRisk) return;
      for (const item of riskMarkers) {
        if (item.marker.setStyle) {
          item.marker.setStyle({
            radius: item.risk.id === selectedRisk.id ? 13 : 10,
            weight: item.risk.id === selectedRisk.id ? 5 : 4
          });
        } else if (item.marker.getElement) {
          const el = item.marker.getElement();
          const marker = el.querySelector(".map-marker");
          if (marker) marker.classList.toggle("active", item.risk.id === selectedRisk.id);
        }
      }
    }

    function renderLeafletRisks() {
      if (!leafletMap) return;
      for (const item of riskMarkers) clearLayer(item.marker);
      riskMarkers = [];

      for (const risk of activeRouteRisks()) {
        const copy = risk.copy[currentLang];
        const marker = L.circleMarker(risk.coord, {
          pane: "markerPane",
          radius: selectedRisk?.id === risk.id ? 13 : 10,
          color: "#ffffff",
          weight: selectedRisk?.id === risk.id ? 5 : 4,
          fillColor: riskColor(risk.level),
          fillOpacity: 1,
          opacity: 1,
          bubblingMouseEvents: false
        }).addTo(leafletMap);
        marker.bindTooltip(copy.title, { direction: "top", offset: [0, -12] });
        marker.on("click", () => {
          selectedRisk = risk;
          renderRisks();
          renderRiskDetails();
          renderLeafletRiskActive();
        });
        riskMarkers.push({ marker, risk });
      }

      renderLeafletRiskActive();
    }
    function routeFallbackCoords(type) {
      return selectedProperty.routeGeometry[type];
    }

    function renderLeafletRoutes() {
      if (!leafletMap) return;

      for (const key of Object.keys(routeLines)) clearLayer(routeLines[key]);
      routeLines = {};

      for (const type of [selectedRoute]) {
        routeLines[type] = L.polyline(routeFallbackCoords(type), routeStyle(type)).addTo(leafletMap);
      }

      (selectedProperty.constructionSegments || []).forEach((segment, index) => {
        routeLines[`construction-${index}`] = L.polyline(segment.coords, constructionStyle()).addTo(leafletMap);
      });
    }

    function renderLeafletMap() {
      if (!ensureLeafletMap()) return;

      clearLayer(homeMarker);
      clearLayer(schoolMarker);

      homeMarker = L.marker(selectedProperty.homeCoord, {
        icon: makeMarkerIcon("home", "H")
      }).addTo(leafletMap);
      schoolMarker = L.marker(activeDestinationCoord(), {
        icon: makeMarkerIcon("destination", selectedProperty.destinationIcon || "S")
      }).addTo(leafletMap);

      homeMarker.bindTooltip(htmlToText(selectedProperty.fullAddress || selectedProperty.title), { direction: "top", offset: [0, -14] });
      schoolMarker.bindTooltip(activeDestinationName(), { direction: "top", offset: [0, -14] });

      renderLeafletRoutes();
      renderLeafletRisks();

      const bounds = L.latLngBounds([
        selectedProperty.homeCoord,
        activeDestinationCoord(),
        ...activeRouteRisks().map((risk) => risk.coord),
        ...selectedProperty.routeGeometry.normal,
        ...selectedProperty.routeGeometry.child
      ]);
      leafletMap.fitBounds(bounds.pad(0.22));
      setTimeout(() => leafletMap.invalidateSize(), 0);
    }

    function renderStaticText() {
      document.documentElement.lang = currentLang;
      document.title = htmlToText(selectedProperty?.fullAddress || selectedProperty?.title || ui[currentLang].pageTitle);
      writeHtml(pageHeading, selectedProperty?.fullAddress || selectedProperty?.title || ui[currentLang].pageTitle);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        writeHtml(el, ui[currentLang][el.dataset.i18n]);
      });

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === currentLang);
      });

      document.querySelectorAll("[data-time]").forEach((button) => {
        button.classList.toggle("active", button.dataset.time === selectedTime);
      });
    }

    function renderOptions() {
      const selectedId = selectedProperty.id;
      select.innerHTML = "";

      for (const property of routeOptionsForSelectedAddress()) {
        const option = document.createElement("option");
        option.value = property.id;
        option.innerHTML = property.routeName?.[currentLang] || property.title;
        select.appendChild(option);
      }

      select.value = selectedId;
    }

    function renderRiskDetails() {
      const copy = selectedRiskCopy();
      if (!copy) {
        const status = trafficFeatureStatus[trafficFeatureKey()];
        const isLoading = status === "loading";
        const isError = status === "error";
        writeHtml(riskTitle, isLoading ? (currentLang === "fi" ? "Tarkistetaan reitin huomioita" : "Checking route notes") : (currentLang === "fi" ? "Ei erityisi&auml; huomioita" : "No special notes"));
        writeHtml(riskDescription, isLoading ? (currentLang === "fi" ? "Kartta tarkistaa koulumatkan ylityksi&auml;, ty&ouml;maita ja muita kohtia, jotka kannattaa huomata arjessa." : "The map is checking crossings, roadworks and other everyday route notes.") : isError ? (currentLang === "fi" ? "Reitin huomioita ei saatu ladattua juuri nyt. Kokeile p&auml;ivitt&auml;&auml; sivu hetken kuluttua." : "Route notes could not be loaded right now. Try refreshing the page in a moment.") : (currentLang === "fi" ? "T&auml;ll&auml; reitill&auml; ei n&auml;y erityisi&auml; kohtia, jotka vaatisivat erillist&auml; huomiota." : "This route does not show any special points that need extra attention."));
        writeHtml(speed, "-");
        writeHtml(lanes, "-");
        writeHtml(crosswalk, "-");
        writeHtml(lights, "-");
        writeHtml(visibility, "-");
        writeHtml(recommendation, currentLang === "fi" ? "K&auml;vele reitti kerran lapsen kanssa ja tarkista, tuntuuko se rauhalliselta my&ouml;s kouluaamun aikaan." : "Walk the route once with the child and check whether it still feels calm during a school-morning window.");
        renderRiskPreviewMap();
        return;
      }
      writeHtml(riskTitle, copy.title);
      writeHtml(riskDescription, copy.description);
      writeHtml(speed, copy.speed);
      writeHtml(lanes, copy.lanes);
      writeHtml(crosswalk, copy.crosswalk);
      writeHtml(lights, copy.lights);
      writeHtml(visibility, copy.visibility);
      writeHtml(recommendation, copy.recommendation);

      document.querySelectorAll("[data-risk-id]").forEach((el) => {
        el.classList.toggle("active", el.dataset.riskId === selectedRisk.id);
      });
      renderLeafletRiskActive();
      renderRiskPreviewMap();
    }

    function renderRisks() {
      riskList.innerHTML = "";
      riskSelect.innerHTML = "";
      const risks = activeRouteRisks();

      if (!selectedRisk || !risks.some((risk) => risk.id === selectedRisk.id)) {
        selectedRisk = risks[0] || null;
      }

      if (!selectedRisk) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = trafficFeatureStatus[trafficFeatureKey()] === "loading" ? (currentLang === "fi" ? "Tarkistetaan reitin huomioita..." : "Checking route notes...") : (currentLang === "fi" ? "Ei erityisi&auml; huomioita" : "No special notes");
        riskSelect.appendChild(option);
        riskSelect.value = "";
        riskSelect.disabled = true;
        return;
      }

      riskSelect.disabled = false;

      for (const risk of risks) {
        const copy = risk.copy[currentLang];
        const option = document.createElement("option");
        option.value = risk.id;
        option.textContent = `${htmlToText(copy.title)} - ${htmlToText(copy.description)}`;
        riskSelect.appendChild(option);
      }

      riskSelect.value = selectedRisk.id;

      const copy = selectedRisk.copy[currentLang];
      const card = document.createElement("button");
      card.type = "button";
      card.className = "risk-card active";
      card.dataset.riskId = selectedRisk.id;
      card.innerHTML = `
        <div class="risk-top">
          <strong>${copy.title}</strong>
          <span class="badge ${selectedRisk.level}">${ui[currentLang][selectedRisk.level]}</span>
        </div>
        <p class="subtle">${copy.description}</p>
        <p class="traffic-line"><strong>${ui[currentLang].trafficRisk}: ${activeTimeProfile().trafficLevel[currentLang]}.</strong> ${activeTimeProfile().riskText[selectedRisk.level][currentLang]}</p>
      `;
      riskList.appendChild(card);
    }
    function renderRoute() {
      const route = selectedProperty.routes[selectedRoute];
      const timeAdjustedScore = clampScore(route.score + activeTimeProfile().scoreDelta[selectedRoute]);
      scoreValue.textContent = timeAdjustedScore.toFixed(1);
      scoreBlock.style.setProperty("--score", timeAdjustedScore);
      writeHtml(scoreText, route.text[currentLang]);
      duration.textContent = route.duration;
      distance.textContent = route.distance;
      riskCount.textContent = `${activeRouteRisks().length}`;
      writeHtml(mapTitle, selectedRoute === "normal" ? ui[currentLang].mapNormal : ui[currentLang].mapChild);
      writeHtml(timeInsightTitle, `${activeTimeProfile().insightTitle[currentLang]} · ${ui[currentLang].recommendedPrefix}: ${selectedRoute === activeTimeProfile().recommendedRoute ? (selectedRoute === "normal" ? ui[currentLang].recommendedNormal : ui[currentLang].recommendedChild) : (activeTimeProfile().recommendedRoute === "normal" ? ui[currentLang].recommendedNormal : ui[currentLang].recommendedChild)}`);
      writeHtml(timeInsightText, activeTimeProfile().insightText[currentLang]);

      if (routeLines.normal) routeLines.normal.setStyle(routeStyle("normal"));
      if (routeLines.child) routeLines.child.setStyle(routeStyle("child"));
      normalBtn.classList.toggle("active", selectedRoute === "normal");
      childBtn.classList.toggle("active", selectedRoute === "child");
    }

    function renderProperty() {
      document.title = htmlToText(selectedProperty.fullAddress || selectedProperty.title);
      writeHtml(pageHeading, selectedProperty.fullAddress || selectedProperty.title);
      selectedRisk = activeRouteRisks().find((risk) => risk.id === selectedRisk?.id) || activeRouteRisks()[0];
      renderRoute();
      renderRisks();
      renderRiskDetails();
      renderLeafletMap();
      ensureTrafficFeaturesLoaded();
    }

    function renderAll() {
      renderStaticText();
      renderOptions();
      renderProperty();
    }

    select.addEventListener("change", (event) => {
      selectedProperty = properties.find((property) => property.id === event.target.value);
      selectedRoute = activeTimeProfile().recommendedRoute;
      selectedRisk = activeRouteRisks()[0];
      updateRouteUrl(selectedProperty);
      renderProperty();
    });

    normalBtn.addEventListener("click", () => {
      selectedRoute = "normal";
      renderRoute();
      selectedRisk = activeRouteRisks()[0];
      renderRisks();
      renderRiskDetails();
      renderLeafletRoutes();
      renderLeafletRisks();
      ensureTrafficFeaturesLoaded();
    });

    childBtn.addEventListener("click", () => {
      selectedRoute = "child";
      selectedRisk = activeRouteRisks()[0];
      renderRoute();
      renderRisks();
      renderRiskDetails();
      renderLeafletRoutes();
      renderLeafletRisks();
      ensureTrafficFeaturesLoaded();
    });

    riskSelect.addEventListener("change", (event) => {
      selectedRisk = activeRouteRisks().find((risk) => risk.id === event.target.value) || activeRouteRisks()[0];
      renderRisks();
      renderRiskDetails();
    });

    document.querySelectorAll("[data-time]").forEach((button) => {
      button.addEventListener("click", () => {
        selectedTime = button.dataset.time;
        selectedRoute = activeTimeProfile().recommendedRoute;
        renderAll();
      });
    });

    document.querySelectorAll("[data-lang]").forEach((button) => {
      button.addEventListener("click", () => {
        currentLang = button.dataset.lang;
        renderAll();
      });
    });

    window.addEventListener("popstate", () => {
      selectedProperty = propertyFromUrl() || selectedProperty;
      selectedRoute = activeTimeProfile().recommendedRoute;
      selectedRisk = activeRouteRisks()[0];
      renderAll();
    });

    selectedRoute = "normal";
    updateRouteUrl(selectedProperty, true);
    renderAll();
  </script>
</body>
</html>
